<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추억의 은하수</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>

    <div id="intro-text">
        <h1 id="main-title">추억의 은하수</h1>
        <strong><p>반짝이는 행성을 클릭하여 우리의 추억을 찾아보세요!</p></strong>
        <p>&copy; atritime. & haeun. All right reserved.</p>
    </div>

    <div id="popup" class="hidden">
        <div class="popup-content">
            <span id="popup-close">&times;</span>
            <div id="popup-date" class="memory-date">202X.XX.XX</div>
            <h2 id="popup-title">추억의 제목</h2>
            <img id="popup-img" src="" alt="우리의 추억 사진">
            <p id="popup-desc">여기에 소중한 추억 이야기가 들어갑니다.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="script.js"></script>
</body>
</html>
